name: Publish to PyPI

# Every push to main auto-publishes the next patch version to PyPI.
# The version is derived from PyPI at build time and injected into the built
# artifact only — it is NOT committed back to main, so there is no push loop.
# (The release job pushes a git *tag*, which does not match the branch trigger.)
# Add "[skip ci]" to a commit message to skip a release.

on:
  push:
    branches: [main]

# Serialize releases so two pushes can't race to publish the same version.
concurrency:
  group: pypi-release
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]   # floor + recent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + dev deps
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q
      - name: Build + validate distribution metadata
        if: matrix.python-version == '3.12'   # metadata is version-independent
        run: |
          pip install twine
          python -m build
          twine check dist/*

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for PyPI Trusted Publishing (OIDC)
      contents: write   # required to push the version tag
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0     # full history incl. tags — the stale-CDN cross-check needs them

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compute next version from PyPI
        id: ver
        run: |
          HTTP=$(curl -s -o pypi.json -w "%{http_code}" https://pypi.org/pypi/nomix-clicker/json)
          if [ "$HTTP" = "200" ]; then
            LATEST=$(python3 -c "import json;print(json.load(open('pypi.json'))['info']['version'])")
          elif [ "$HTTP" = "404" ]; then
            LATEST=""   # project has never been published
          else
            echo "::error::PyPI returned HTTP $HTTP while resolving the latest version — aborting to avoid a bad release."
            exit 1
          fi
          rm -f pypi.json
          # PyPI's JSON can be CDN-stale right after a release; the last tag is not
          LATEST_TAG=$(git tag -l 'v*' | sed 's/^v//' | sort -V | tail -n 1)
          NEXT=$(python3 - "$LATEST" "$LATEST_TAG" <<'EOF'
          import re, sys

          def parse(v):
              m = re.match(r"(\d+)\.(\d+)\.(\d+)", v or "")
              return tuple(int(x) for x in m.groups()) if m else None

          versions = [p for p in (parse(a) for a in sys.argv[1:3]) if p]
          if versions:
              major, minor, patch = max(versions)
              print(f"{major}.{minor}.{patch + 1}")
          else:
              print("0.1.0")  # first release ever
          EOF
          )
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Latest on PyPI: ${LATEST:-'(none)'} | latest tag: ${LATEST_TAG:-'(none)'} -> publishing: $NEXT"

      - name: Inject version into pyproject.toml (build-only, never committed)
        env:
          NEXT: ${{ steps.ver.outputs.next }}
        run: |
          sed -i "s/^version = \".*\"/version = \"$NEXT\"/" pyproject.toml
          grep -q "^version = \"$NEXT\"\$" pyproject.toml || {
            echo "::error::Version injection failed — the version line in pyproject.toml no longer matches the sed pattern."
            exit 1
          }

      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

      # Non-fatal: the PyPI release already succeeded above, so a tagging
      # hiccup (protected tag, already exists) must not mark the run failed —
      # but it must be visible, since the tag guards against stale PyPI CDN reads.
      - name: Tag the released version
        env:
          NEXT: ${{ steps.ver.outputs.next }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --tags origin "refs/tags/v$NEXT" >/dev/null 2>&1; then
            echo "Tag v$NEXT already exists on origin — skipping."
          elif git tag "v$NEXT" && git push origin "v$NEXT"; then
            echo "Pushed tag v$NEXT."
          else
            echo "::warning::Failed to push tag v$NEXT — without it, the next release may recompute an already-published version if PyPI's CDN is stale."
          fi
